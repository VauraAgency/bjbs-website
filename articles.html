<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles | @BenjaminJBSmith</title>
  <meta name="description" content="Articles by Benjamin JB Smith on business, investing, mindset, and building in public.">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/theme-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans antialiased bg-white text-slate-800 dark:bg-slate-900 dark:text-slate-200 tracking-tight">
  <main class="max-w-4xl mx-auto px-6 md:px-10 py-14 space-y-12">
    <header>
      <p class="text-xs uppercase tracking-widest text-btc font-semibold mb-2">Long form</p>
      <h1 class="text-4xl md:text-5xl font-extrabold leading-tight text-slate-900 dark:text-slate-100 mb-3">Articles</h1>
      <p class="text-lg text-slate-500 dark:text-slate-400 max-w-2xl">Longer-form writing on business, investing, and the maker life. First pieces are being drafted now.</p>
    </header>
    <section>
      <div class="carousel sm:grid sm:grid-cols-2 sm:gap-5" id="articles-grid"><!-- populated by JS --></div>
      <div class="text-center mt-6 sm:hidden">
        <button id="view-all-btn" class="text-indigo-500 hover:underline font-medium text-sm">View all →</button>
      </div>
    </section>

    <div id="articles-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto">
        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
          <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">All articles</h2>
          <button id="close-modal-btn" class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">✕</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 p-6" id="articles-modal-grid"><!-- populated by JS --></div>
      </div>
    </div>

    <div id="article-detail-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto">
        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
          <h2 class="text-lg font-bold text-slate-900 dark:text-slate-100" id="detail-title"></h2>
          <button id="close-detail-btn" class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">✕</button>
        </div>
        <div class="p-6">
          <p class="text-xs uppercase tracking-wide text-indigo-500 font-semibold mb-3" id="detail-meta"></p>
          <div class="prose prose-invert max-w-none text-slate-600 dark:text-slate-400 leading-relaxed" id="detail-text"></div>
        </div>
      </div>
    </div>

    <script>
      const cardHtml = (article) => `
        <div class="glass rounded-2xl p-6 cursor-pointer hover:opacity-90 transition group" data-article-id="${article.id}">
          <p class="text-xs uppercase tracking-wide text-indigo-500 font-semibold mb-1">${article.category}</p>
          <h3 class="font-bold text-lg mb-1 text-slate-900 dark:text-slate-100 group-hover:text-indigo-500 transition">${article.title}</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400">${article.excerpt}</p>
        </div>`;

      fetch('data/articles.json').then(r => r.ok ? r.json() : []).then(articles => {
        if (!articles.length) {
          document.getElementById('articles-grid').innerHTML = '<p class="text-sm text-slate-500">Articles coming soon...</p>';
          return;
        }

        const first5 = articles.slice(0, 5);
        document.getElementById('articles-grid').innerHTML = first5.map(cardHtml).join('');
        document.getElementById('articles-modal-grid').innerHTML = articles.map(cardHtml).join('');

        // Add click listeners to open detail modal
        document.querySelectorAll('[data-article-id]').forEach(el => {
          el.addEventListener('click', (e) => {
            const id = el.getAttribute('data-article-id');
            const article = articles.find(a => a.id === id);
            if (article) {
              document.getElementById('detail-title').textContent = article.title;
              document.getElementById('detail-meta').textContent = `${article.category} · ${article.date}`;
              document.getElementById('detail-text').innerHTML = article.fullText.split('\n').map(p => `<p>${p}</p>`).join('');
              document.getElementById('article-detail-modal').classList.remove('hidden');
            }
          });
        });
      });

      document.getElementById('view-all-btn').addEventListener('click', () => {
        document.getElementById('articles-modal').classList.remove('hidden');
      });
      document.getElementById('close-modal-btn').addEventListener('click', () => {
        document.getElementById('articles-modal').classList.add('hidden');
      });
      document.getElementById('articles-modal').addEventListener('click', (e) => {
        if (e.target.id === 'articles-modal') {
          document.getElementById('articles-modal').classList.add('hidden');
        }
      });
      document.getElementById('close-detail-btn').addEventListener('click', () => {
        document.getElementById('article-detail-modal').classList.add('hidden');
      });
      document.getElementById('article-detail-modal').addEventListener('click', (e) => {
        if (e.target.id === 'article-detail-modal') {
          document.getElementById('article-detail-modal').classList.add('hidden');
        }
      });
    </script>
  </main>
  <div id="site-footer"></div>
  <script src="js/site.js"></script>
</body>
</html>
