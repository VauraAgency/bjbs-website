name: Update content feed

on:
  schedule:
    - cron: "0 13 * * *" # daily ~8am Central
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest content
        run: python3 scripts/fetch_content.py
      - name: Commit if changed
        run: |
          git config user.name "content-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update content feed"
          git push
