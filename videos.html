<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos | @BenjaminJBSmith</title>
  <meta name="description" content="Videos and reels from Benjamin JB Smith — entrepreneurship, crypto, real estate, travel, fitness.">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/theme-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans antialiased bg-white text-slate-800 dark:bg-slate-900 dark:text-slate-200 tracking-tight">
  <main class="max-w-4xl mx-auto px-6 md:px-10 py-14 space-y-12">
    <header>
      <p class="text-xs uppercase tracking-widest text-btc font-semibold mb-2">Watch</p>
      <h1 class="text-4xl md:text-5xl font-extrabold leading-tight text-slate-900 dark:text-slate-100 mb-3">Long-form videos</h1>
      <p class="text-lg text-slate-500 dark:text-slate-400 max-w-2xl">Deep-dive videos on business, investing, and the journey. Updated as new uploads go live.</p>
    </header>
    <section>
      <div id="videos-row" class="carousel sm:grid sm:grid-cols-2 sm:gap-5"><p class="text-sm text-slate-500 dark:text-slate-400">Long-form videos are in production — the Mexico recap and the Bitcoin DCA breakdown are up first.</p></div>
      <div class="text-center mt-6 sm:hidden">
        <button id="view-all-btn" class="text-indigo-500 hover:underline font-medium text-sm">View all →</button>
      </div>
    </section>

    <div id="videos-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto">
        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
          <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">All videos</h2>
          <button id="close-modal-btn" class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">✕</button>
        </div>
        <div id="videos-modal-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5 p-6"></div>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="js/site.js"></script>
  <script>
    const cardHtml = v => `
      <a href="${v.url}" target="_blank" rel="noopener" class="group block">
        <div class="aspect-video rounded-xl mb-3 overflow-hidden"><img src="${v.thumb}" alt="" loading="lazy" class="w-full h-full object-cover transition group-hover:scale-105"></div>
        <p class="text-xs uppercase tracking-wide text-indigo-500 font-semibold mb-1">${v.label} · ${v.date}</p>
        <h3 class="font-bold leading-snug text-slate-900 dark:text-slate-100 group-hover:text-indigo-500 transition">${v.title}</h3>
      </a>`;

    fetch('data/videos.json').then(r => r.ok ? r.json() : []).then(videos => {
      const longform = videos.filter(v => v.cat === 'video');
      if (longform.length) {
        document.getElementById('videos-row').innerHTML = longform.map(cardHtml).join('');
        document.getElementById('videos-modal-grid').innerHTML = longform.map(cardHtml).join('');
      }
    });

    document.getElementById('view-all-btn').addEventListener('click', () => {
      document.getElementById('videos-modal').classList.remove('hidden');
    });
    document.getElementById('close-modal-btn').addEventListener('click', () => {
      document.getElementById('videos-modal').classList.add('hidden');
    });
    document.getElementById('videos-modal').addEventListener('click', (e) => {
      if (e.target.id === 'videos-modal') {
        document.getElementById('videos-modal').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
